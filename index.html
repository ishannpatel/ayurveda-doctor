async function callClaude(messages, system) {
  try {
    const r = await fetch("https://ayurveda-doctor.onrender.com/api/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system,messages})
    });
    const d = await r.json();
    return d.content?.[0]?.text || "Sorry, could not get a response.";
  } catch(e) {
    return "⚠️ Could not reach the server. Please try again in a moment — Render free tier may be waking up (takes ~30 seconds). 🌿";
  }
}

function QuizPage({setDosha}) {
  const [step,setStep] = useState(0);
  const [scores,setScores] = useState({vata:0,pitta:0,kapha:0});
  const [result,setResult] = useState(null);

  const pick = d => {
    const ns = {...scores,[d]:scores[d]+1};
    if(step+1 >= QUIZ.length) {
      const dom = Object.entries(ns).sort((a,b)=>b[1]-a[1])[0][0];
      setScores(ns); setResult(dom); setDosha(dom);
    } else { setScores(ns); setStep(step+1); }
  };

  const reset = () => { setStep(0); setScores({vata:0,pitta:0,kapha:0}); setResult(null); };

  if(result) {
    const info = DI[result];
    const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
    return (
      <div style={{padding:"28px 16px",maxWidth:680,margin:"0 auto"}}>
        <STitle icon="🎉" title="Your Dosha Result" />
        <Card style={{textAlign:"center",borderTop:`6px solid ${info.color}`,marginBottom:20}}>
          <div style={{fontSize:60}}>{info.emoji}</div>
          <h2 style={{color:info.color,fontSize:30,fontWeight:900,margin:"10px 0 6px"}}>{result.charAt(0).toUpperCase()+result.slice(1)} Dominant</h2>
          <p style={{color:C.muted,maxWidth:420,margin:"0 auto 18px",lineHeight:1.6}}>{info.desc}</p>
          <div style={{display:"flex",justifyContent:"center",gap:8,flexWrap:"wrap"}}>
            {sorted.map(([k,v])=><Badge key={k} label={`${k}: ${v}/${QUIZ.length}`} color={DI[k].color}/>)}
          </div>
        </Card>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          {[["💪 Strengths",info.strengths,C.green],["⚠️ Watch out for",info.weaknesses,C.saffron],["✅ Best foods",info.foods,C.green],["🚫 Avoid",info.avoid,C.saffron]].map(([h,v,col])=>(
            <Card key={h}>
              <p style={{color:col,fontWeight:700,margin:"0 0 6px",fontSize:13}}>{h}</p>
              <p style={{color:C.text,fontSize:14,margin:0,lineHeight:1.6}}>{v}</p>
            </Card>
          ))}
        </div>
        <button onClick={reset} style={{background:C.green,color:"#fff",border:"none",borderRadius:50,padding:"13px 30px",cursor:"pointer",fontWeight:700,fontSize:15}}>🔄 Retake Quiz</button>
      </div>
    );
  }

  const q = QUIZ[step];
  const pct = (step/QUIZ.length)*100;
  return (
    <div style={{padding:"28px 16px",maxWidth:580,margin:"0 auto"}}>
      <STitle icon="🧘" title="Prakriti Dosha Quiz" sub="Answer 9 questions to discover your Ayurvedic body type" />
      <div style={{background:C.border,borderRadius:50,height:8,marginBottom:6}}>
        <div style={{background:C.green,height:8,borderRadius:50,width:`${pct}%`,transition:"width 0.4s"}}/>
      </div>
      <p style={{color:C.muted,fontSize:13,marginBottom:20,textAlign:"right"}}>Question {step+1} of {QUIZ.length}</p>
      <Card>
        <h3 style={{color:C.brown,fontSize:19,fontWeight:700,margin:"0 0 22px"}}>{q.q}</h3>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {q.opts.map((o,i)=>(
            <button key={i} onClick={()=>pick(o.d)} style={{background:C.beige,border:`2px solid ${C.border}`,borderRadius:12,padding:"15px 18px",cursor:"pointer",textAlign:"left",fontSize:15,color:C.text,fontWeight:500,lineHeight:1.4}}>
              {o.t}

  );
}

5. 🧘 Yoga & Pranayama Suggestion
Be specific, educational and warm. End with a short disclaimer.`;
    const t = await callClaude([{role:"user",content:`Symptoms: ${symptoms}${dosha?`\nMy dosha: ${dosha}`:""}`}], sys);
    setResult(t); setLoading(false);
  };

  return (
    <div style={{padding:"28px 16px",maxWidth:720,margin:"0 auto"}}>
      <STitle icon="🔍" title="AI Symptom Checker" sub="Describe your symptoms for personalized Ayurvedic guidance" />
      <Card style={{marginBottom:16}}>
        <textarea value={input} onChange={e=>setInput(e.target.value)} placeholder="Describe your symptoms... e.g. I have acne, oily skin, and feel irritable often" style={{width:"100%",minHeight:110,border:`1px solid ${C.border}`,borderRadius:10,padding:14,fontSize:15,background:C.bg,color:C.text,resize:"vertical",outline:"none",lineHeight:1.6}}/>
        <div style={{marginTop:12,marginBottom:14}}>
          <p style={{color:C.muted,fontSize:12,margin:"0 0 8px",fontWeight:600}}>COMMON SYMPTOMS — tap to add:</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {common.map(s=>(
              <button key={s} onClick={()=>setInput(p=>p?p+", "+s:s)} style={{background:C.beige,border:`1px solid ${C.border}`,borderRadius:20,padding:"5px 13px",fontSize:12,cursor:"pointer",color:C.brown,fontWeight:500}}>
                {s}
              </button>
            ))}
          </div>
        </div>
        <button onClick={()=>analyze(input)} disabled={loading||!input.trim()} style={{background:loading?C.muted:C.green,color:"#fff",border:"none",borderRadius:50,padding:"13px 30px",cursor:loading?"not-allowed":"pointer",fontWeight:700,fontSize:15}}>
          {loading ? "🔄 Analyzing..." : "🔍 Analyze Symptoms"}
        </button>
      </Card>
      {result && (
        <Card style={{whiteSpace:"pre-wrap",lineHeight:1.8,color:C.text,fontSize:14}}>
          {result}
        </Card>
      )}
    </div>
  );
}

function DiseasesPage() {
  const [sel,setSel] = useState(null);
  const [search,setSearch] = useState("");
  const filtered = DISEASES.filter(d=>d.name.toLowerCase().includes(search.toLowerCase()));
  return (
    <div style={{padding:"28px 16px",maxWidth:920,margin:"0 auto"}}>
      <STitle icon="📋" title="Disease & Condition Guide" sub="Ayurvedic insights for 12 common health conditions" />
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search conditions..." style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:50,padding:"11px 22px",fontSize:14,marginBottom:20,background:C.card,color:C.text,outline:"none"}}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:14,marginBottom:24}}>
        {filtered.map(d=>{
          const dc = DI[d.dosha.split(",")[0].trim().toLowerCase()]?.color || C.green;
          return (
            <Card key={d.name} style={{cursor:"pointer",borderLeft:`5px solid ${dc}`,padding:16}} onClick={()=>setSel(sel?.name===d.name?null:d)}>
              <div style={{fontSize:26}}>{d.e}</div>
              <div style={{color:C.brown,fontWeight:700,fontSize:15,marginTop:6,marginBottom:6}}>{d.name}</div>
              <Badge label={d.dosha} color={dc}/>
            </Card>
          );
        })}
      </div>
      {sel && (
        <Card style={{borderTop:`5px solid ${C.saffron}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <h3 style={{color:C.brown,fontWeight:800,fontSize:20,margin:0}}>{sel.e} {sel.name}</h3>
            <button onClick={()=>setSel(null)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.muted}}>✕</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
            {[["🩺 Symptoms",sel.symptoms],["⚖️ Dosha Imbalance",sel.dosha],["🥗 Diet",sel.diet],["🌿 Remedy",sel.remedy],["🌅 Lifestyle",sel.lifestyle]].map(([h,v])=>(
              <div key={h} style={{background:C.beige,borderRadius:12,padding:14}}>
                <p style={{color:C.saffron,fontWeight:700,fontSize:12,margin:"0 0 6px"}}>{h}</p>
                <p style={{color:C.text,fontSize:13,margin:0,lineHeight:1.6}}>{v}</p>
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
}

  return (
    <div style={{padding:"28px 16px",maxWidth:920,margin:"0 auto"}}>
      <STitle icon="🌿" title="Ayurvedic Herb Guide" sub="Nature's pharmacy — click any herb to explore its benefits" />
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:14,marginBottom:20}}>

          <Card key={h.name} style={{cursor:"pointer",textAlign:"center",padding:16,borderTop:sel?.name===h.name?`4px solid ${C.green}`:"4px solid transparent"}} onClick={()=>setSel(sel?.name===h.name?null:h)}>
            <div style={{fontSize:38}}>{h.e}</div>

            <div style={{color:C.muted,fontSize:12,marginTop:4}}>{h.dosha}</div>

              <div key={h} style={{background:C.beige,borderRadius:12,padding:14}}>
                <p style={{color:C.green,fontWeight:700,fontSize:12,margin:"0 0 6px"}}>{h}</p>

function FoodsPage() {
  const [filter,setFilter] = useState("all");

  return (

      <STitle icon="🥗" title="Ayurvedic Food Guide" sub="Discover which foods balance or aggravate your dosha" />
      <div style={{display:"flex",gap:10,marginBottom:22,flexWrap:"wrap"}}>
        {["all","vata","pitta","kapha"].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?C.green:C.beige,color:filter===f?"#fff":C.brown,border:`1px solid ${C.border}`,borderRadius:50,padding:"9px 20px",cursor:"pointer",fontWeight:600,fontSize:13}}>
            {f==="all" ? "🌿 All Foods" : DI[f].emoji+" "+f.charAt(0).toUpperCase()+f.slice(1)}
          </button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:14}}>
        {filtered.map(f=>(
          <Card key={f.name} style={{padding:16}}>
            <div style={{fontSize:34,textAlign:"center"}}>{f.e}</div>
            <div style={{color:C.brown,fontWeight:700,textAlign:"center",marginTop:8,marginBottom:10}}>{f.name}</div>
            <div style={{fontSize:12,display:"flex",flexDirection:"column",gap:5}}>
              <span style={{color:C.green}}>✅ Good: {f.good}</span>
              {f.mod!=="—" && <span style={{color:C.saffron}}>〰️ Moderate: {f.mod}</span>}
              <span style={{color:"#c0392b"}}>🚫 Avoid: {f.avoid}</span>

          </Card>
        ))}
      </div>

function ChatPage({dosha}) {
  const [msgs,setMsgs] = useState([{role:"assistant",text:"Namaste! 🙏 I'm your AI Ayurveda guide. Ask me anything about Ayurvedic health, your dosha, herbs, diet, or natural remedies. I'm here to help!"}]);
  const [input,setInput] = useState("");
  const [loading,setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs]);

  const send = async () => {
    if(!input.trim()||loading) return;
    const um = input.trim(); setInput("");
    setMsgs(m=>[...m,{role:"user",text:um}]); setLoading(true);
    const sys = `You are a warm, knowledgeable Ayurvedic health guide.${dosha?` The user's dominant dosha is ${dosha}.`:""} Give practical, specific Ayurvedic guidance. Keep responses friendly and concise (under 200 words). Use emojis naturally. Always end with a gentle reminder to consult a healthcare professional for serious conditions.`;
    const history = msgs.map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
    const reply = await callClaude([...history,{role:"user",content:um}], sys);
    setMsgs(m=>[...m,{role:"assistant",text:reply}]); setLoading(false);
  };

  const sugg = ["What should a Pitta person eat?","Natural remedy for hair fall","How to improve digestion","Best herbs for stress relief","Morning routine for Vata"];

  return (
    <div style={{padding:"28px 16px",maxWidth:720,margin:"0 auto"}}>
      <STitle icon="💬" title="Ayurveda AI Chat" sub="Ask anything about Ayurvedic health and wellness" />
      <Card style={{marginBottom:12}}>
        <div style={{minHeight:340,maxHeight:460,overflowY:"auto",display:"flex",flexDirection:"column",gap:12,padding:"4px 2px"}}>
          {msgs.map((m,i)=>(
            <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
              <div style={{maxWidth:"80%",background:m.role==="user"?C.green:C.beige,color:m.role==="user"?"#fff":C.text,borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"12px 16px",fontSize:14,lineHeight:1.7,whiteSpace:"pre-wrap"}}>
                {m.role==="assistant" && <span style={{fontSize:16}}>🌿 </span>}{m.text}
              </div>
            </div>
          ))}
          {loading && (
            <div style={{display:"flex"}}>
              <div style={{background:C.beige,borderRadius:"18px 18px 18px 4px",padding:"12px 16px",fontSize:14,color:C.muted}}>🌿 Thinking...</div>
            </div>
          )}
          <div ref={endRef}/>
        </div>
      </Card>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
        {sugg.map(s=>(
          <button key={s} onClick={()=>setInput(s)} style={{background:C.beige,border:`1px solid ${C.border}`,borderRadius:20,padding:"5px 13px",fontSize:12,cursor:"pointer",color:C.brown}}>
            {s}
          </button>
        ))}
      </div>
      <div style={{display:"flex",gap:10}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Ask about your health..." style={{flex:1,border:`1px solid ${C.border}`,borderRadius:50,padding:"13px 22px",fontSize:15,background:C.card,color:C.text,outline:"none"}}/>
        <button onClick={send} disabled={loading||!input.trim()} style={{background:C.green,color:"#fff",border:"none",borderRadius:50,padding:"13px 22px",cursor:"pointer",fontWeight:700,fontSize:15,whiteSpace:"nowrap"}}>Send 🌿</button>
      </div>
    </div>
  );
}

function App() {
  const [page,setPage] = useState("home");
  const [dosha,setDosha] = useState(null);
  const pages = {
    home:<HomePage dosha={dosha} setPage={setPage}/>,
    quiz:<QuizPage setDosha={setDosha}/>,
    symptom:<SymptomPage dosha={dosha}/>,
    diseases:<DiseasesPage/>,
    herbs:<HerbsPage/>,
    foods:<FoodsPage/>,
    chat:<ChatPage dosha={dosha}/>,
  };
  return (
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'Segoe UI',sans-serif",color:C.text}}>
      <NavBar page={page} setPage={setPage} dosha={dosha}/>
      {pages[page]}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
